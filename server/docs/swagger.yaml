        in: query
        name: remark
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/middleware.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.AdminGetListRes'
              type: object
      security:
      - Bearer: []
      summary: 获取文件列表
      tags:
      - 管理后台
